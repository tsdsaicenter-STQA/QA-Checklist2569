<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบตรวจประเมินประกันคุณภาพการฝึกอบรมฝีมือแรงงาน</title>
<style>
/* ─── RESET & BASE ─────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#185FA5;--blue-light:#E6F1FB;--blue-mid:#85B7EB;--blue-dark:#0C447C;
  --green:#3B6D11;--green-light:#EAF3DE;--green-mid:#C0DD97;--green-dark:#639922;
  --amber:#BA7517;--amber-light:#FAEEDA;--amber-dark:#854F0B;
  --red:#A32D2D;--red-light:#FCEBEB;
  --bg:#FFFFFF;--bg2:#F5F5F7;--bg3:#EBEBED;
  --border:#D1D1D6;--border2:#E5E5EA;
  --text:#1C1C1E;--text2:#6C6C70;--text3:#AEAEB2;
  --font:'Sarabun',sans-serif;
  --radius:8px;
}
body{font-family:var(--font);font-size:13px;color:var(--text);background:var(--bg);line-height:1.5}
@import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&display=swap');

/* ─── LAYOUT ───────────────────────────────────────────────── */
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.topbar{display:flex;align-items:center;gap:10px;padding:0 16px;height:48px;
  background:var(--blue-dark);flex-shrink:0}
.topbar-icon{width:26px;height:26px;border-radius:6px;background:rgba(255,255,255,.2);
  display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.topbar-title{font-size:14px;font-weight:600;color:#fff}
.topbar-sub{font-size:11px;color:rgba(255,255,255,.65);margin-left:8px}
.topbar-right{margin-left:auto;display:flex;gap:6px;align-items:center}
.type-pill{font-size:11px;padding:3px 10px;border-radius:99px;cursor:pointer;
  border:1.5px solid rgba(255,255,255,.3);color:rgba(255,255,255,.7);transition:.15s}
.type-pill.active{background:#fff;border-color:#fff;color:var(--blue-dark);font-weight:600}

.body{display:flex;flex:1;overflow:hidden}
.sidebar{width:200px;background:var(--bg2);border-right:0.5px solid var(--border);
  overflow-y:auto;flex-shrink:0;padding:8px 0}
.sb-section{font-size:10px;color:var(--text3);padding:8px 12px 3px;letter-spacing:.06em;text-transform:uppercase}
.sb-item{display:flex;align-items:center;gap:7px;padding:6px 12px;font-size:12px;
  color:var(--text2);cursor:pointer;user-select:none;transition:.1s}
.sb-item:hover{background:var(--bg3);color:var(--text)}
.sb-item.active{background:var(--bg);color:var(--blue);font-weight:600;
  border-right:2.5px solid var(--blue)}
.sb-dot{width:7px;height:7px;border-radius:50%;background:var(--border);flex-shrink:0}
.sb-dot.done{background:var(--green-dark)}
.sb-dot.active{background:var(--blue)}
.sb-dot.partial{background:var(--amber)}
.sb-score{margin-left:auto;font-size:10px;color:var(--text3)}
.sb-score.done{color:var(--green)}
.sb-divider{height:.5px;background:var(--border2);margin:6px 12px}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.infobar{display:flex;gap:8px;padding:8px 16px;background:var(--bg);
  border-bottom:.5px solid var(--border2);flex-wrap:wrap;align-items:center;flex-shrink:0}
.ib-lbl{font-size:11px;color:var(--text2);white-space:nowrap}
.ib-sel, .ib-inp{font-size:12px;padding:5px 10px;border:1px solid var(--border);
  border-radius:6px;background:var(--bg);color:var(--text);font-family:var(--font);cursor:pointer}
.ib-sel:focus,.ib-inp:focus{outline:none;border-color:var(--blue)}

.std-header{padding:8px 16px;background:var(--blue-light);border-bottom:.5px solid var(--blue-mid);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.std-title{font-size:13px;font-weight:600;color:var(--blue-dark)}
.std-sub{font-size:11px;color:var(--blue);margin-top:1px}
.score-cards{display:flex;gap:8px;align-items:center}
.sc{padding:4px 12px;background:#fff;border-radius:var(--radius);
  border:.5px solid var(--border2);text-align:center;min-width:54px}
.sc-num{font-size:16px;font-weight:600}
.sc-lbl{font-size:9px;color:var(--text2)}

/* ─── TABLE ─────────────────────────────────────────────────── */
.tbl-wrap{flex:1;overflow:auto}
table{border-collapse:collapse;width:100%;min-width:960px;table-layout:fixed}
thead th{font-size:10px;font-weight:500;color:var(--text2);padding:7px 5px;
  background:var(--bg2);border:.5px solid var(--border);text-align:center;
  position:sticky;top:0;z-index:3;line-height:1.35;vertical-align:middle}
thead th.left{text-align:left;padding-left:7px}
tbody td{font-size:11px;color:var(--text);padding:6px 5px;border:.5px solid var(--border2);
  vertical-align:top;line-height:1.5}
tbody tr:hover td{background:rgba(24,95,165,.03)}
tbody tr.alt td{background:var(--bg2)}
tbody tr.main-row td{background:#F0F6FC}
tbody tr.main-row:hover td{background:#E8F2FB}

.ref-badge{font-size:9px;padding:1px 5px;border-radius:99px;
  background:var(--blue-light);color:var(--blue-dark);border:.5px solid var(--blue-mid);
  white-space:nowrap;display:inline-block;margin-top:2px}
.score-badge{font-size:10px;padding:1px 6px;border-radius:99px;
  background:var(--blue-light);color:var(--blue-dark);border:.5px solid var(--blue-mid);
  font-weight:600;white-space:nowrap}

.yn-sel{font-size:12px;border:1px solid var(--border);border-radius:5px;padding:2px 3px;
  width:100%;text-align:center;font-weight:600;background:var(--bg);
  color:var(--text);font-family:var(--font);cursor:pointer}
.yn-sel:focus{outline:none;border-color:var(--blue)}
.yn-y{background:var(--green-light)!important;color:var(--green)!important;border-color:var(--green-mid)!important}
.yn-n{background:var(--red-light)!important;color:var(--red)!important;border-color:#F7C1C1!important}

.cb-wrap{display:flex;flex-direction:column;gap:5px;padding:2px 0}
.cb-lbl{display:flex;align-items:center;gap:4px;font-size:11px;cursor:pointer;user-select:none}
.cb-lbl input{accent-color:var(--blue);width:14px;height:14px;cursor:pointer}
.cb-lbl.disabled{opacity:.35;cursor:not-allowed}
.cb-lbl.disabled input{cursor:not-allowed}

.remark-ta{width:100%;font-size:11px;border:1px solid var(--border2);border-radius:5px;
  background:var(--bg);color:var(--text);resize:vertical;line-height:1.5;
  font-family:var(--font);padding:4px 6px;min-height:56px}
.remark-ta:focus{outline:none;border-color:var(--blue)}

/* ─── STATUS BAR ─────────────────────────────────────────────── */
.statusbar{display:flex;align-items:center;gap:12px;padding:8px 16px;
  background:var(--bg2);border-top:.5px solid var(--border);flex-wrap:wrap;flex-shrink:0}
.sum-card{padding:5px 14px;background:var(--bg);border-radius:var(--radius);
  border:.5px solid var(--border2);text-align:center;min-width:58px}
.sum-num{font-size:16px;font-weight:600}
.sum-lbl{font-size:9px;color:var(--text2)}
.prog-wrap{flex:1;min-width:120px}
.prog-bar{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-top:5px}
.prog-fill{height:100%;border-radius:3px;transition:width .3s}
.status-pill{font-size:10px;padding:2px 9px;border-radius:99px}
.nav-btn{font-size:11px;padding:5px 14px;border-radius:var(--radius);
  border:1px solid var(--border);color:var(--text2);background:var(--bg);cursor:pointer;
  font-family:var(--font)}
.nav-btn.primary{background:var(--blue);border-color:var(--blue);color:#fff;font-weight:500}
.nav-btn:hover{filter:brightness(.95)}
.exp-btn{font-size:11px;padding:5px 14px;border-radius:var(--radius);
  background:var(--blue);color:#fff;border:none;cursor:pointer;font-family:var(--font);font-weight:500}

/* ─── DASHBOARD ──────────────────────────────────────────────── */
.dash-wrap{flex:1;overflow:auto;padding:16px}
.dash-filters{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.dash-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:16px}
.dash-card{padding:10px 14px;border:.5px solid var(--border2);border-radius:var(--radius);background:var(--bg)}
.dash-card-num{font-size:22px;font-weight:600}
.dash-card-lbl{font-size:10px;color:var(--text2);margin-top:2px}
.hist-hdr{display:grid;grid-template-columns:195px 135px 1fr 64px 70px;gap:0;
  padding:5px 0;border-bottom:.5px solid var(--border);margin-bottom:4px}
.hist-hdr div{font-size:10px;font-weight:500;color:var(--text2)}
.hist-row{display:grid;grid-template-columns:195px 135px 1fr 64px 70px;gap:0;
  align-items:center;padding:5px 0;border-bottom:.5px solid var(--border2)}
.hist-row:last-child{border-bottom:none}
.hist-unit{font-size:11px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:8px}
.hist-inspector{font-size:10px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:8px}
.hist-track{height:8px;background:var(--bg3);border-radius:4px;overflow:hidden;margin:0 8px}
.hist-fill{height:100%;border-radius:4px;transition:width .3s}
.hist-val{font-size:11px;text-align:right;padding-right:6px;font-weight:500}
.hist-status{font-size:10px;padding:2px 8px;border-radius:99px;text-align:center;font-weight:500}
.empty-msg{text-align:center;padding:48px 20px;color:var(--text3);font-size:13px}

/* ─── TABS ──────────────────────────────────────────────────── */
.tab-bar{display:flex;border-bottom:.5px solid var(--border);background:var(--bg);flex-shrink:0}
.tab{font-size:12px;padding:8px 18px;color:var(--text2);border-bottom:2.5px solid transparent;
  cursor:pointer;user-select:none;transition:.1s}
.tab.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:600}
.tab:hover:not(.active){color:var(--text)}

/* ─── EMPTY STATE ────────────────────────────────────────────── */
.empty-state{flex:1;display:flex;align-items:center;justify-content:center;
  color:var(--text3);font-size:13px;text-align:center;padding:24px}
</style>
</head>
<body>
<div class="app" id="app"></div>

  return rows.reduce((s,r) => s + r.score, 0);
}

const STD_TOTALS = (() => {
  const out = { เตรียม:{}, ยกระดับ:{}, อาชีพ:{} };
  const typeMap = {1:"เตรียม",2:"ยกระดับ",3:"อาชีพ"};
  [1,2,3,4,5,7].forEach(std => {
    [1,2,3].forEach(t => {
      const tk = typeMap[t];
      // null: STD5/7 fallback to type 1 (เตรียม), STD3/4 type 3 fallback to type 2 (ยกระดับ)
      let rows = ALL_DATA[std][t];
      if (rows === null) rows = ALL_DATA[std][1] || ALL_DATA[std][2];
      out[tk][std] = rows ? rows.reduce((s,r) => s + r.score, 0) : 0;
    });
  });
  return out;
})();

const STD_NAMES = {
  1:"การจัดหลักสูตร", 2:"ผู้รับการฝึก",
  3:"ครูฝึก", 4:"วิธีการฝึก",
  5:"สถานที่และสภาพแวดล้อม", 7:"การประชาสัมพันธ์"
};

function getRows(type, std) {
  // type: 1=เตรียม, 2=ยกระดับ, 3=อาชีพ
  const rows = ALL_DATA[std][type];
  if (rows !== null && rows !== undefined) return rows;
  // null = fallback:
  //   STD3/4 type 3 (อาชีพ) → ใช้ type 2 (ยกระดับ)
  //   STD5/7 type 2,3 → ใช้ type 1 (เตรียม) เพราะ type 2 ก็ null
  const fallback = ALL_DATA[std][2] !== null ? ALL_DATA[std][2] : ALL_DATA[std][1];
  const prefix = type === 1 ? "t" : type === 3 ? "a" : "u";
  return fallback.map(r => ({
    ...r,
    id: r.id.replace(/^[tua]/, prefix)
  }));
}

// STATE
// ═══════════════════════════════════════════════════════════════
const sessions = {}; // key = `${type}-${unit}`
let currentType = 1; // 1=เตรียม 2=ยกระดับ 3=อาชีพ
let currentStd = 1;
let currentUnit = "";
let currentTab = "form"; // "form" | "dashboard"
let dashUnitFilter = "all";
let dashInspFilter = "all";
let dashTypeFilter = "all";

const TYPE_LABELS = {1:"การฝึกเตรียมเข้าทำงาน", 2:"การฝึกยกระดับฝีมือ", 3:"การฝึกอาชีพเสริม"};
const TYPE_SHORT = {1:"เตรียม", 2:"ยกระดับ", 3:"อาชีพ"};
const STDS = [1,2,3,4,5,7];

function sessKey() { return `${currentType}-${currentUnit}`; }

function getSess(type, unit) {
  const k = `${type}-${unit}`;
  if (!sessions[k]) {
    const ans = {};
    STDS.forEach(s => {
      getRows(type, s).forEach(r => {
        ans[r.id] = {yn:"", have:false, correct:false, remark:""};
      });
    });
    sessions[k] = {answers:ans, inspector:"", date:new Date().toISOString().slice(0,10)};
  }
  return sessions[k];
}

function getStdScore(type, unit, std) {
  if (!sessions[`${type}-${unit}`]) return 0;
  const ans = sessions[`${type}-${unit}`].answers;
  return getRows(type, std).reduce((s,r) => s+(ans[r.id]&&ans[r.id].have&&ans[r.id].correct?r.score:0), 0);
}
function getTotalScore(type, unit) {
  return STDS.reduce((s,std)=>s+getStdScore(type,unit,std), 0);
}
function getMaxScore(type, std) {
  const t={1:"เตรียม",2:"ยกระดับ",3:"อาชีพ"}[type];
  return STD_TOTALS[t][std];
}
function getAllMaxScore(type) {
  return STDS.reduce((s,std)=>s+getMaxScore(type,std),0);
}
function hasData(type, unit) {
  if (!sessions[`${type}-${unit}`]) return false;
  const sess = sessions[`${type}-${unit}`];
  if (sess._sheetCounts && Object.keys(sess._sheetCounts).length > 0) return true;
  return Object.values(sess.answers).some(a=>a.yn||a.have||a.remark);
}

function h(tag, attrs={}, ...children) {
  const el = document.createElement(tag);
  Object.entries(attrs).forEach(([k,v])=>{ if(k==="style"&&typeof v==="object"){Object.assign(el.style,v);}else{el[k]=v;} });
  children.flat().forEach(c=>{ if(c!=null) el.append(typeof c==="string"?document.createTextNode(c):c); });
  return el;
}
function clr(pass, scored) {
  return pass?"var(--green)":scored>0?"var(--amber)":"var(--text2)";
}
function pillStyle(pass, scored) {
  return pass
    ? {background:"var(--green-light)",color:"var(--green)"}
    : scored>0
      ? {background:"var(--amber-light)",color:"var(--amber)"}
      : {background:"var(--bg3)",color:"var(--text3)"};
}

  const ta=h("textarea",{className:"remark-ta",placeholder:"พิมพ์ความคิดเห็น/ข้อเสนอแนะ..."},ans.remark||"");
  ta.oninput=e=>{sess.answers[row.id].remark=e.target.value;};
  tdR.append(ta);tr.append(tdR);
  return tr;
}

// ─── COUNT HELPERS ────────────────────────────────────────────
function getStdCounts(type, unit, std) {
  if (!sessions[`${type}-${unit}`]) return {total:0,haveCount:0,correctCount:0,concordCount:0,concordBase:0};
  const ans = sessions[`${type}-${unit}`].answers;
  const rows = getRows(type, std);
  let total=0, haveCount=0, correctCount=0, concordCount=0, concordBase=0;
  rows.forEach(r=>{
    total++;
    const a = ans[r.id]||{};
    if(a.have) haveCount++;
    if(a.have&&a.correct) correctCount++;
    // นับ concordance เฉพาะแถวที่กรอก Y/N แล้ว
    if(a.yn==="Y"||a.yn==="N"){
      concordBase++;
      // ผลตรวจจริง: มีและถูกต้อง = Y, อย่างอื่น = N
      const inspResult = (a.have && a.correct) ? "Y" : "N";
      if(a.yn === inspResult) concordCount++;
    }
  });
  return {total, haveCount, correctCount, concordCount, concordBase};
}

// ─── STATUS BAR ───────────────────────────────────────────────
function renderStatusBar(sc, mx, pct, pass) {
  const bar = h("div",{className:"statusbar"});

  const cnt = currentUnit ? getStdCounts(currentType, currentUnit, currentStd) : {total:0,haveCount:0,correctCount:0,concordCount:0,concordBase:0};
  const havePct = cnt.total>0 ? Math.round(cnt.haveCount/cnt.total*100) : 0;
  const correctPct = cnt.total>0 ? Math.round(cnt.correctCount/cnt.total*100) : 0;
  const concordPct = cnt.concordBase>0 ? Math.round(cnt.concordCount/cnt.concordBase*100) : 0;
  const concordColor = concordPct>=80?"var(--green)":concordPct>0?"var(--amber)":"var(--text2)";

  bar.append(
    h("div",{className:"sum-card"},[
      h("div",{className:"sum-num",id:"sb-have",style:{color:havePct>=80?"var(--green)":havePct>0?"var(--amber)":"var(--text2)"}},`${cnt.haveCount}/${cnt.total}`),
      h("div",{className:"sum-lbl"},`มี (${havePct}%)`),
    ]),
    h("div",{className:"sum-card"},[
      h("div",{className:"sum-num",id:"sb-correct",style:{color:clr(pass,sc)}},`${cnt.correctCount}/${cnt.total}`),
      h("div",{className:"sum-lbl"},`มีและถูกต้อง (${correctPct}%)`),
    ]),
    h("div",{className:"sum-card",title:"Y/N ของหน่วยฝึกสอดคล้องกับผลตรวจจริง (มี+ถูกต้อง=Y, อื่นๆ=N) เฉพาะแถวที่กรอก Y/N แล้ว"},[
      h("div",{className:"sum-num",id:"sb-concord",style:{color:concordColor}},
        cnt.concordBase>0 ? `${cnt.concordCount}/${cnt.concordBase}` : "—"),
      h("div",{className:"sum-lbl",id:"sb-concord-lbl"},`สอดคล้อง (${cnt.concordBase>0?concordPct+"%":"—"})`),
    ]),
    h("div",{className:"sum-card"},[
      h("div",{className:"sum-num",id:"sb-scored",style:{color:clr(pass,sc)}},sc.toFixed(1)),
      h("div",{className:"sum-lbl"},`คะแนน / ${mx}`),
    ]),
    h("div",{className:"prog-wrap"},[
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},[
        h("span",{style:{fontSize:"10px",color:"var(--text2)"}},"เกณฑ์ผ่าน ≥80%"),
        h("span",{id:"sb-pill",className:"status-pill",style:pillStyle(pass,sc)},
          pass?"✓ ผ่านเกณฑ์":sc>0?"ยังไม่ผ่าน":"ยังไม่ได้ตรวจ"),
      ]),
      h("div",{className:"prog-bar"},
        h("div",{id:"sb-fill",className:"prog-fill",style:{width:pct+"%",background:pass?"var(--green-dark)":sc>0?"var(--amber)":"var(--border)"}}))
    ])
  );

  // ปุ่ม export + save to Sheets
  if (currentUnit) {
    const expStd = h("button",{className:"exp-btn",style:{background:"var(--green-dark)",flexShrink:0}},
      `💾 ส่ง/บันทึก มาตรฐาน ${currentStd}`);
    expStd.onclick = async () => {
      // export .txt ก่อนเสมอ (offline backup)
      exportStd(currentStd);
      // save ไป Sheets ถ้าตั้งค่าแล้ว
      if (isConfigured()) {
        showToast("กำลังบันทึกข้อมูล...", "loading");
        const result = await syncSave(currentType, currentUnit, currentStd);
        if (result.ok) {
          showToast("บันทึกสำเร็จ ✓ " + result.message, "success");
        } else {
          showToast("บันทึกไม่สำเร็จ: " + result.error, "error");
        }
      }
    };
    bar.append(expStd);
  }

  // nav buttons
  const stdIdx = STDS.indexOf(currentStd);
  if (stdIdx > 0) {
    const prev = h("button",{className:"nav-btn"},"← "+STD_NAMES[STDS[stdIdx-1]]);
    prev.onclick = () => { currentStd=STDS[stdIdx-1]; render(); };
    bar.append(prev);
  }
  if (stdIdx < STDS.length-1) {
    const next = h("button",{className:"nav-btn primary"},STD_NAMES[STDS[stdIdx+1]]+" →");
    next.onclick = () => { currentStd=STDS[stdIdx+1]; render(); };
    bar.append(next);
  }
  return bar;
}

function updateStatusBar() {
  if (!currentUnit) return;
  const sc = getStdScore(currentType, currentUnit, currentStd);
  const mx = getMaxScore(currentType, currentStd);
  const pct = Math.round((sc/mx)*100);
  const pass = pct >= 80;
  const c = clr(pass,sc);
  const cnt = getStdCounts(currentType, currentUnit, currentStd);
  const havePct = cnt.total>0?Math.round(cnt.haveCount/cnt.total*100):0;
  const correctPct = cnt.total>0?Math.round(cnt.correctCount/cnt.total*100):0;
  const concordPct = cnt.concordBase>0?Math.round(cnt.concordCount/cnt.concordBase*100):0;
  const concordColor = concordPct>=80?"var(--green)":concordPct>0?"var(--amber)":"var(--text2)";
  const el = id => document.getElementById(id);
  if(el("sb-have")){
    el("sb-have").textContent=`${cnt.haveCount}/${cnt.total}`;
    el("sb-have").style.color=havePct>=80?"var(--green)":havePct>0?"var(--amber)":"var(--text2)";
    el("sb-have").nextElementSibling.textContent=`มี (${havePct}%)`;
  }
  if(el("sb-correct")){
    el("sb-correct").textContent=`${cnt.correctCount}/${cnt.total}`;
    el("sb-correct").style.color=c;
    el("sb-correct").nextElementSibling.textContent=`มีและถูกต้อง (${correctPct}%)`;
  }
  if(el("sb-concord")){
    el("sb-concord").textContent=cnt.concordBase>0?`${cnt.concordCount}/${cnt.concordBase}`:"—";
    el("sb-concord").style.color=concordColor;
    el("sb-concord-lbl").textContent=`สอดคล้อง (${cnt.concordBase>0?concordPct+"%":"—"})`;
  }
  if(el("sb-scored")){el("sb-scored").textContent=sc.toFixed(1);el("sb-scored").style.color=c;}
  if(el("sb-fill")){el("sb-fill").style.width=pct+"%";el("sb-fill").style.background=pass?"var(--green-dark)":sc>0?"var(--amber)":"var(--border)";}
  if(el("sb-pill")){
    Object.assign(el("sb-pill").style,pillStyle(pass,sc));
    el("sb-pill").textContent=pass?"✓ ผ่านเกณฑ์":sc>0?"ยังไม่ผ่าน":"ยังไม่ได้ตรวจ";
  }
  // update sidebar scores
  document.querySelectorAll(".sb-score").forEach((el,i)=>{
    if(i<STDS.length && currentUnit){
      const s=STDS[i];
      const ssc=getStdScore(currentType,currentUnit,s);
      const smx=getMaxScore(currentType,s);
      el.textContent=`${ssc.toFixed(1)}/${smx}`;
      el.className="sb-score"+(ssc/smx>=0.8?" done":"");
    }
  });
}

// ═══════════════════════════════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════════════════════════════
function renderDashboard() {
  const allUnits = [...UNITS_SPR,...UNITS_SNP];
  const allTypes = [1,2,3];

  // collect sessions with data — one entry per (type, unit, std) that has been touched
  const entries = [];
  allTypes.forEach(t=>{
    allUnits.forEach(u=>{
      if(!hasData(t,u)) return;
      const sess = sessions[`${t}-${u}`];
      STDS.forEach(std=>{
        const rows = getRows(t,std);
        const hasStdData = rows.some(r=>{
          const a=sess.answers[r.id]||{};
          return a.yn||a.have||a.remark;
        });
        if(!hasStdData) return;
        const cnt = (sess._sheetCounts && sess._sheetCounts[std])
          ? sess._sheetCounts[std]
          : (() => {
              const c = getStdCounts(t,u,std);
              const sc2 = getStdScore(t,u,std);
              const mx2 = getMaxScore(t,std);
              return {
                ...c,
                score: sc2, maxScore: mx2,
                scorePct: mx2>0?Math.round(sc2/mx2*100):0,
                havePct: c.total>0?Math.round(c.haveCount/c.total*100):0,
                correctPct: c.total>0?Math.round(c.correctCount/c.total*100):0,
                concordPct: c.concordBase>0?Math.round(c.concordCount/c.concordBase*100):0,
              };
            })();
        const sc = cnt.score ?? getStdScore(t,u,std);
        const mx = cnt.maxScore ?? getMaxScore(t,std);
        const scorePct = cnt.scorePct ?? (mx>0?Math.round(sc/mx*100):0);
        const havePct = cnt.havePct ?? 0;
        const correctPct = cnt.correctPct ?? 0;
        const concordPct = cnt.concordPct ?? 0;
        entries.push({
          type:t, unit:u, std,
          inspector: sess.inspector||"",
          date: sess.date||"",
          sc, mx, scorePct, pass:scorePct>=80,
          haveCount:cnt.haveCount, correctCount:cnt.correctCount, total:cnt.total,
          havePct, correctPct,
          concordCount:cnt.concordCount, concordBase:cnt.concordBase, concordPct,
        });
      });
    });
  });

  let filtered = entries;
  if (dashTypeFilter!=="all") filtered=filtered.filter(e=>e.type===parseInt(dashTypeFilter));
  if (dashUnitFilter!=="all") filtered=filtered.filter(e=>e.unit===dashUnitFilter);
  if (dashInspFilter!=="all") filtered=filtered.filter(e=>e.inspector===dashInspFilter);

  const wrap = h("div",{className:"dash-wrap",style:{flex:1,overflow:"auto"}});

  // Filters
  const filters = h("div",{className:"dash-filters"});
  const typeSel = h("select",{className:"ib-sel"});
  typeSel.append(h("option",{value:"all"},"ทุกประเภทการฝึก"));
  [1,2,3].forEach(t=>typeSel.append(h("option",{value:t,selected:dashTypeFilter==t},TYPE_LABELS[t])));
  typeSel.onchange=e=>{dashTypeFilter=e.target.value;render();};
  const unitSel2 = h("select",{className:"ib-sel",style:{width:"200px"}});
  unitSel2.append(h("option",{value:"all"},"ทุกหน่วยฝึก"));
  const g1b=h("optgroup",{label:"สพร."});
  UNITS_SPR.forEach(u=>g1b.append(h("option",{value:u,selected:dashUnitFilter===u},u)));
  const g2b=h("optgroup",{label:"สนพ."});
  UNITS_SNP.forEach(u=>g2b.append(h("option",{value:u,selected:dashUnitFilter===u},u)));
  unitSel2.append(g1b,g2b);
  unitSel2.onchange=e=>{dashUnitFilter=e.target.value;render();};
  const inspSel2 = h("select",{className:"ib-sel",style:{width:"200px"}});
  inspSel2.append(h("option",{value:"all"},"ผู้ตรวจทุกคน"));
  INSPECTORS.forEach(n=>inspSel2.append(h("option",{value:n,selected:dashInspFilter===n},n)));
  inspSel2.onchange=e=>{dashInspFilter=e.target.value;render();};
  filters.append(
    h("span",{className:"ib-lbl"},"ประเภทการฝึก:"),typeSel,
    h("span",{className:"ib-lbl"},"หน่วยฝึก:"),unitSel2,
    h("span",{className:"ib-lbl"},"ผู้ตรวจสอบ:"),inspSel2,
  );
  // ปุ่ม sync dashboard จาก Sheets
  if (isConfigured()) {
    const syncBtn = h("button",{className:"exp-btn",style:{marginLeft:"auto"}}, "🔄 โหลดข้อมูลจาก Sheets");
    syncBtn.onclick = async () => {
      showToast("กำลังโหลดข้อมูลทั้งหมด...", "loading");
      const result = await syncLoadAll();
      if (result.ok && result.data) {
        // inject data into sessions
        result.data.forEach(row => {
          const t = row.type;
          const u = row.unit;
          const std = row.std;
          const sess = getSess(t, u);
          if (row.inspector) sess.inspector = row.inspector;
          if (row.date) sess.date = row.date;
          // answers ไม่ได้ส่งมาใน loadAll (ประหยัด bandwidth) แต่ counts พร้อม
          // inject counts สำหรับ dashboard ให้ใช้
          if (!sess._sheetCounts) sess._sheetCounts = {};
          sess._sheetCounts[std] = {
            total: row.total, haveCount: row.haveCount, correctCount: row.correctCount,
            concordCount: row.concordCount, concordBase: row.concordBase,
            score: row.score, maxScore: row.maxScore, scorePct: row.scorePct,
            havePct: row.havePct, correctPct: row.correctPct, concordPct: row.concordPct
          };
          // mark as having data
          if (!sessions[`${t}-${u}`]) getSess(t, u);
          const rows = getRows(t, std);
          rows.forEach(r => {
            if (!sess.answers[r.id]) sess.answers[r.id] = {yn:"",have:false,correct:false,remark:""};
            // ถ้ายังไม่มีข้อมูล Y/N ให้ mark ว่ามีข้อมูลเพื่อให้ dashboard แสดง
            if (row.haveCount > 0 && !sess.answers[r.id].yn && !sess.answers[r.id].have) {
              sess.answers[r.id]._fromSheet = true;
            }
          });
        });
        showToast(`โหลดข้อมูล ${result.data.length} รายการ`, "success");
        render();
      } else {
        showToast("โหลดไม่สำเร็จ: " + (result.error||"ไม่ทราบสาเหตุ"), "error");
      }
    };
    filters.append(syncBtn);
  } else {
    filters.append(h("span",{style:{fontSize:"10px",color:"var(--amber)",marginLeft:"auto"}},"⚠ ยังไม่ได้ตั้งค่า Apps Script URL"));
  }
  wrap.append(filters);

  if (entries.length===0) {
    wrap.append(h("div",{className:"empty-msg"},
      "ยังไม่มีข้อมูลการตรวจ\nกลับแท็บ \"กรอกข้อมูลตรวจ\" เลือกหน่วยฝึกและกรอกผลก่อน"));
    return wrap;
  }

  // Summary cards (based on filtered)
  const passCount = filtered.filter(e=>e.pass).length;
  const avgHavePct = filtered.length>0?Math.round(filtered.reduce((s,e)=>s+e.havePct,0)/filtered.length):0;
  const avgCorrectPct = filtered.length>0?Math.round(filtered.reduce((s,e)=>s+e.correctPct,0)/filtered.length):0;
  const concordFiltered = filtered.filter(e=>e.concordBase>0);
  const avgConcordPct = concordFiltered.length>0?Math.round(concordFiltered.reduce((s,e)=>s+e.concordPct,0)/concordFiltered.length):0;
  const cards = h("div",{className:"dash-cards"});
  [
    [filtered.length,"มาตรฐานที่ตรวจแล้ว","var(--blue)"],
    [passCount,"มาตรฐานผ่านเกณฑ์ ≥80%","var(--green)"],
    [filtered.length-passCount,"ยังไม่ผ่าน","var(--red)"],
    [avgHavePct+"%","เฉลี่ย มี (%)","var(--blue)"],
    [avgCorrectPct+"%","เฉลี่ย มีและถูกต้อง (%)","var(--green-dark)"],
    [concordFiltered.length>0?avgConcordPct+"%":"—","เฉลี่ย สอดคล้อง (%)","var(--amber)"],
  ].forEach(([num,lbl,col])=>{
    cards.append(h("div",{className:"dash-card"},[
      h("div",{className:"dash-card-num",style:{color:col}},num.toString()),
      h("div",{className:"dash-card-lbl"},lbl),
    ]));
  });
  wrap.append(cards);

  if (filtered.length===0) {
    wrap.append(h("div",{className:"empty-msg"},"ไม่พบข้อมูลตามเงื่อนไขที่เลือก"));
    return wrap;
  }

  // Table header
  const tbl = document.createElement("table");
  tbl.style.cssText="border-collapse:collapse;width:100%;font-size:11px";
  const thead = document.createElement("thead");
  const thr = document.createElement("tr");
  ["หน่วยฝึก / ประเภท","ผู้ตรวจสอบ","มาตรฐาน","✓ มี (ข้อ/%)","✓ มีและถูกต้อง (ข้อ/%)","⇄ สอดคล้อง Y/N (ข้อ/%)","คะแนน","สถานะ"].forEach(txt=>{
    const th=document.createElement("th");
    th.textContent=txt;
    th.style.cssText="padding:6px 8px;background:var(--bg2);border:.5px solid var(--border);text-align:left;font-weight:500;color:var(--text2);font-size:10px;white-space:nowrap";
    thr.append(th);
  });
  thead.append(thr); tbl.append(thead);
  const tbody = document.createElement("tbody");

  // group by unit+type for visual grouping
  let prevKey="";
  filtered.forEach((e,i)=>{
    const key=`${e.type}-${e.unit}`;
    const isNewGroup = key!==prevKey;
    prevKey=key;
    const tr=document.createElement("tr");
    tr.style.background=i%2===0?"var(--bg)":"var(--bg2)";
    if(isNewGroup) tr.style.borderTop="1.5px solid var(--border)";

    // หน่วยฝึก
    const tdUnit=document.createElement("td");
    tdUnit.style.cssText="padding:5px 8px;border:.5px solid var(--border2);font-weight:500";
    if(isNewGroup){
      const typeTag=h("span",{style:{fontSize:"9px",padding:"1px 5px",borderRadius:"99px",background:"var(--blue-light)",color:"var(--blue-dark)",marginLeft:"5px"}},TYPE_SHORT[e.type]);
      tdUnit.append(e.unit, typeTag);
    } else { tdUnit.textContent=""; }
    tr.append(tdUnit);

    // ผู้ตรวจสอบ
    const tdInsp=document.createElement("td");
    tdInsp.style.cssText="padding:5px 8px;border:.5px solid var(--border2);color:var(--text2);font-size:10px";
    tdInsp.textContent=isNewGroup?(e.inspector||"—"):"";
    tr.append(tdInsp);

    // มาตรฐาน
    const tdStd=document.createElement("td");
    tdStd.style.cssText="padding:5px 8px;border:.5px solid var(--border2);white-space:nowrap";
    tdStd.innerHTML=`<span style="font-weight:500;color:var(--blue-dark)">มาตรฐาน ${e.std}</span> <span style="color:var(--text2);font-size:10px">${STD_NAMES[e.std]}</span>`;
    tr.append(tdStd);

    // มี
    const tdHave=document.createElement("td");
    tdHave.style.cssText="padding:5px 8px;border:.5px solid var(--border2)";
    const haveColor=e.havePct>=80?"var(--green)":e.havePct>0?"var(--amber)":"var(--text3)";
    tdHave.innerHTML=`<span style="font-weight:600;color:${haveColor}">${e.haveCount}/${e.total}</span> <span style="font-size:10px;color:${haveColor}">(${e.havePct}%)</span>`;
    tr.append(tdHave);

    // มีและถูกต้อง
    const tdCorrect=document.createElement("td");
    tdCorrect.style.cssText="padding:5px 8px;border:.5px solid var(--border2)";
    const corrColor=e.correctPct>=80?"var(--green)":e.correctPct>0?"var(--amber)":"var(--text3)";
    tdCorrect.innerHTML=`<span style="font-weight:600;color:${corrColor}">${e.correctCount}/${e.total}</span> <span style="font-size:10px;color:${corrColor}">(${e.correctPct}%)</span>`;
    tr.append(tdCorrect);

    // สอดคล้อง Y/N
    const tdConcord=document.createElement("td");
    tdConcord.style.cssText="padding:5px 8px;border:.5px solid var(--border2)";
    if(e.concordBase>0){
      const cc=e.concordPct>=80?"var(--green)":e.concordPct>0?"var(--amber)":"var(--text3)";
      tdConcord.innerHTML=`<span style="font-weight:600;color:${cc}">${e.concordCount}/${e.concordBase}</span> <span style="font-size:10px;color:${cc}">(${e.concordPct}%)</span>`;
    } else {
      tdConcord.innerHTML=`<span style="color:var(--text3);font-size:10px">ยังไม่กรอก Y/N</span>`;
    }
    tr.append(tdConcord);

    // คะแนน
    const tdSc=document.createElement("td");
    tdSc.style.cssText="padding:5px 8px;border:.5px solid var(--border2);white-space:nowrap";
    const scColor=e.pass?"var(--green)":e.sc>0?"var(--amber)":"var(--text3)";
    tdSc.innerHTML=`<span style="font-weight:600;color:${scColor}">${e.sc.toFixed(1)}</span><span style="color:var(--text2);font-size:10px"> /${e.mx}</span>`;
    tr.append(tdSc);

    // สถานะ
    const tdStatus=document.createElement("td");
    tdStatus.style.cssText="padding:5px 8px;border:.5px solid var(--border2)";
    const ps=pillStyle(e.pass,e.sc);
    const pill=h("span",{className:"status-pill",style:ps},e.pass?"✓ ผ่าน":"ยังไม่ผ่าน");
    tdStatus.append(pill);
    tr.append(tdStatus);

    tbody.append(tr);
  });
  tbl.append(tbody);
  wrap.append(tbl);
  return wrap;
}

// ═══════════════════════════════════════════════════════════════
// EXPORT — แยกมาตรฐาน
// ═══════════════════════════════════════════════════════════════
function exportStd(std) {
  if (!currentUnit) return;

  const cnt = getStdCounts(currentType, currentUnit, std);
  const havePct = cnt.total>0?Math.round(cnt.haveCount/cnt.total*100):0;
  const correctPct = cnt.total>0?Math.round(cnt.correctCount/cnt.total*100):0;
  const concordPct = cnt.concordBase>0?Math.round(cnt.concordCount/cnt.concordBase*100):0;
  const lines = [
    "แบบตรวจรายการประเมินประกันคุณภาพการฝึกอบรมฝีมือแรงงาน",

    `⇄ สอดคล้อง Y/N: ${cnt.concordBase>0?`${cnt.concordCount}/${cnt.concordBase} ข้อ (${concordPct}%)`:"ยังไม่กรอก Y/N"}`,
    `คะแนน: ${sc.toFixed(1)} / ${mx} (${pct}%)  ${pct>=80?"[ผ่านเกณฑ์]":"[ยังไม่ผ่าน]"}`,
    "─".repeat(70), "",
  ];
  getRows(currentType, std).forEach(r=>{

    const a=sess.answers[r.id]||{};
    lines.push(`  รายการ: ${r.criteria}`);
    lines.push(`  หน่วยฝึก Y/N: ${a.yn||"—"}  |  มี: ${a.have?"✓":"✗"}  |  ถูกต้อง: ${a.correct?"✓":"✗"}${a.remark?`\n  หมายเหตุ: ${a.remark}`:""}`);
  });
  lines.push(`\n${"═".repeat(70)}`);
  lines.push(`สรุปมาตรฐาน ${std}: ${sc.toFixed(1)}/${mx} คะแนน (${pct}%) — มี ${cnt.haveCount}/${cnt.total} ข้อ — มีและถูกต้อง ${cnt.correctCount}/${cnt.total} ข้อ — สอดคล้อง Y/N ${cnt.concordBase>0?`${cnt.concordCount}/${cnt.concordBase} ข้อ (${concordPct}%)`:"ยังไม่กรอก Y/N"}`);
  const blob=new Blob([lines.join("\n")],{type:"text/plain;charset=utf-8"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");

  a.click(); URL.revokeObjectURL(url);
}

// GOOGLE SHEETS SYNC
// ═══════════════════════════════════════════════════════════════

// ← ใส่ URL จาก Apps Script ที่นี่
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxtz1PH2kSA8Fwl-uPTPzOIvRRJ2pad3pCspHG57XBwDQxsBw_mwtdimIjlZihETTDHdQ/exec";

const STD_NAMES_TH = {1:"การจัดหลักสูตร",2:"ผู้รับการฝึก",3:"ครูฝึก",4:"วิธีการฝึก",5:"สถานที่และสภาพแวดล้อม",7:"การประชาสัมพันธ์"};

function isConfigured() {
  return APPS_SCRIPT_URL && APPS_SCRIPT_URL !== "YOUR_APPS_SCRIPT_URL_HERE";
}

// ── บันทึกมาตรฐานเดียวไป Sheets ──────────────────────────────
async function syncSave(type, unit, std) {
  if (!isConfigured()) return {ok:false, error:"ยังไม่ได้ตั้งค่า Apps Script URL"};
  const sess = getSess(type, unit);
  const cnt = getStdCounts(type, unit, std);
  const sc = getStdScore(type, unit, std);
  const mx = getMaxScore(type, std);
  const scorePct = mx>0?Math.round(sc/mx*100):0;
  const havePct = cnt.total>0?Math.round(cnt.haveCount/cnt.total*100):0;
  const correctPct = cnt.total>0?Math.round(cnt.correctCount/cnt.total*100):0;
  const concordPct = cnt.concordBase>0?Math.round(cnt.concordCount/cnt.concordBase*100):0;

  // เก็บเฉพาะ answers ของ std นี้
  const rows = getRows(type, std);
  const answers = {};
  rows.forEach(r => { answers[r.id] = sess.answers[r.id] || {yn:"",have:false,correct:false,remark:""}; });

  const payload = {
    action:"save", type, unit,
    std, stdName: STD_NAMES_TH[std],
    inspector: sess.inspector||"", date: sess.date||"",
    total: cnt.total, haveCount: cnt.haveCount, correctCount: cnt.correctCount,
    concordCount: cnt.concordCount, concordBase: cnt.concordBase,
    score: sc, maxScore: mx, scorePct,
    havePct, correctPct, concordPct,
    answers
  };

  try {
    const res = await fetch(APPS_SCRIPT_URL, {
      method:"POST", body:JSON.stringify(payload),
      headers:{"Content-Type":"text/plain"} // Apps Script requires text/plain for CORS
    });
    const json = await res.json();
    return json;
  } catch(e) {
    return {ok:false, error:e.message};
  }
}

// ── โหลดข้อมูลจาก Sheets ──────────────────────────────────────
async function syncLoad(type, unit, std) {
  if (!isConfigured()) return {ok:false};
  try {
    const url = `${APPS_SCRIPT_URL}?action=load&type=${type}&unit=${encodeURIComponent(unit)}&std=${std}`;
    const res = await fetch(url);
    const json = await res.json();
    if (json.ok && json.data) {
      const sess = getSess(type, unit);
      // restore answers
      Object.assign(sess.answers, json.data.answers||{});
      if (json.data.inspector) sess.inspector = json.data.inspector;
      if (json.data.date) sess.date = json.data.date;
    }
    return json;
  } catch(e) {
    return {ok:false, error:e.message};
  }
}

// ── โหลดข้อมูลทั้งหมดสำหรับ dashboard ────────────────────────
async function syncLoadAll() {
  if (!isConfigured()) return {ok:false};
  try {
    const res = await fetch(`${APPS_SCRIPT_URL}?action=loadAll`);
    return await res.json();
  } catch(e) {
    return {ok:false, error:e.message};
  }
}

// ── แสดง toast notification ───────────────────────────────────
function showToast(msg, type="info") { // type: info | success | error | loading
  let toast = document.getElementById("toast");
  if (!toast) {
    toast = document.createElement("div");
    toast.id = "toast";
    toast.style.cssText = "position:fixed;bottom:24px;right:24px;z-index:9999;padding:10px 18px;border-radius:8px;font-size:12px;font-family:var(--font);box-shadow:0 4px 16px rgba(0,0,0,.15);transition:opacity .3s;display:flex;align-items:center;gap:8px;max-width:360px";
    document.body.append(toast);
  }
  const colors = {
    info:    {bg:"#1C1C1E", color:"#fff"},
    success: {bg:"var(--green-dark)", color:"#fff"},
    error:   {bg:"var(--red)", color:"#fff"},
    loading: {bg:"var(--blue)", color:"#fff"},
  };
  const c = colors[type] || colors.info;
  toast.style.background = c.bg;
  toast.style.color = c.color;
  toast.style.opacity = "1";
  const icons = {info:"ℹ️", success:"✅", error:"❌", loading:"⏳"};
  toast.innerHTML = `<span>${icons[type]||""}</span><span>${msg}</span>`;
  if (type !== "loading") {
    clearTimeout(toast._timer);
    toast._timer = setTimeout(()=>{ toast.style.opacity="0"; }, 3500);
  }
}
